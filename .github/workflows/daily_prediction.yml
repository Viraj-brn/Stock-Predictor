name: Daily Stock Predictions

on:
  schedule:
    # Runs at 22:30 UTC (4:00 AM IST the next day) on Mon-Fri
    # Markets close at 4 PM ET (~20:00-21:00 UTC), so this gives 
    # Twelve Data a solid 1.5 to 2.5 hour buffer to consolidate final EOD prices.
    - cron: '30 22 * * 1-5'
  workflow_dispatch:  # Allow manual triggering for testing

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push updated predictions.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-predict-${{ hashFiles('requirements-actions.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-predict-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Run daily prediction
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: python scripts/daily_predict.py

      - name: Commit and push updated predictions
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/predictions.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📈 Update daily predictions — $(date -u +%Y-%m-%d)"
          git push
